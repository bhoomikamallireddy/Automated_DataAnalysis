name: SonarCloud Analysis (branch-aware)

on:
  push:
    branches:
      - main
      - content-generator

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan (content-generator)
        if: github.ref_name == 'content-generator'
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.sources=ai_content_generator/
            -Dsonar.inclusions=ai_content_generator/backend/**/*.py,ai_content_generator/frontend/src/app/**/*.tsx,ai_content_generator/frontend/src/app/**/*.ts
            -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/.next/**,**/dist/**,**/migrations/**,**/__pycache__/**,**/public/**
            -Dsonar.coverage.exclusions=**/*

      - name: SonarCloud Scan (main)
        if: github.ref_name == 'main'
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=${{ github.ref_name }}
name: SonarCloud Analysis

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for SonarCloud to see commit history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key
          DB_PASSWORD: test-db-password
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          EMAIL_HOST_USER: test@example.com
          EMAIL_HOST_PASSWORD: test-email-password
          FRONTEND_URL: http://localhost:3000
        run: pytest --cov=api --cov=core --cov-config=.coveragerc --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
