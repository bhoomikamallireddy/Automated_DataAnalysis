name: SonarCloud Analysis

on:
  push:
    branches:
      - main
      - content-generator
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================================================
      # SCAN LOGIC FOR: content-generator branch
      # =========================================================
      - name: SonarCloud Scan (AI Architect)
        if: github.ref_name == 'content-generator'
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=bhoomikamallireddy_AI_Architect
            -Dsonar.projectName="AI Content Generator"
            -Dsonar.organization=bhoomikamallireddy
            -Dsonar.sources=ai_content_generator/
            -Dsonar.inclusions=ai_content_generator/backend/**/*.py,ai_content_generator/frontend/src/app/**/*.tsx
            -Dsonar.branch.name=main

      # =========================================================
      # SCAN LOGIC FOR: main branch (AutoEDA)
      # =========================================================
      - name: Set up Python for AutoEDA
        if: github.ref_name == 'main'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AutoEDA dependencies
        if: github.ref_name == 'main'
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run AutoEDA tests with coverage
        if: github.ref_name == 'main'
        working-directory: backend
        env:
          SECRET_KEY: test-secret-key
          DB_PASSWORD: test-db-password
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          EMAIL_HOST_USER: test@example.com
          EMAIL_HOST_PASSWORD: test-email-password
          FRONTEND_URL: http://localhost:3000
        run: |
          pytest --cov=api --cov=core --cov-report=xml:coverage.xml

      - name: SonarCloud Scan (Main - AutoEDA)
        if: github.ref_name == 'main'
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=main
