sonar.projectKey=bhoomikamallireddy_Automated_DataAnalysis
sonar.organization=bhoomikamallireddy
sonar.host.url=https://sonarcloud.io

# Default to scanning the main AutoEDA application (keeps existing main branch behavior).
# For branch-specific scans (e.g., content-generator), the workflow overrides `sonar.sources`
# using `-Dsonar.sources=...` so the content-generator branch can focus only on the
# `ai_content_generator/` folder.
sonar.sources=backend/api,backend/core,frontend/app,frontend/components,frontend/hooks,frontend/utils,frontend/constants
sonar.inclusions=backend/api/**/*.py,backend/core/**/*.py,frontend/app/**/*.js,frontend/components/**/*.js,frontend/hooks/**/*.js,frontend/utils/**/*.js,frontend/constants/**/*.js

# Exclusions: prevent scanning dependencies, build outputs and test-only files
sonar.exclusions=**/*.zip,**/node_modules/**,**/venv/**,**/.env,**/migrations/**,**/dist/**,**/.next/**,**/coverage/**,**/__pycache__/**,backend/api/tests.py,backend/api/test_*.py,frontend/tests/**
sonar.coverage.exclusions=backend/manage.py,backend/core/asgi.py,backend/core/wsgi.py,backend/core/settings.py,backend/core/test_settings.py,backend/conftest.py,frontend/**
sonar.python.coverage.reportPaths=backend/coverage.xml

# Tell SonarCloud where the main languages are
sonar.python.version=3.11
sonar.javascript.environments=browser,node

# NOTE: When running on the `content-generator` branch the workflow will pass
# the following overrides to focus the scan on the ai_content_generator folder:
# -Dsonar.sources=ai_content_generator/
# -Dsonar.inclusions=ai_content_generator/backend/**/*.py,ai_content_generator/frontend/src/app/**/*.tsx,ai_content_generator/frontend/src/app/**/*.ts
# -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/.next/**,**/dist/**,**/migrations/**,**/__pycache__/**,**/public/**
# -Dsonar.coverage.exclusions=**/*
