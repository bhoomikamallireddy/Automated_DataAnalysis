sonar.projectKey=bhoomikamallireddy_Automated_DataAnalysis
sonar.organization=bhoomikamallireddy
sonar.host.url=https://sonarcloud.io

# Application source roots
sonar.sources=backend/api,backend/core,frontend/app,frontend/components,frontend/hooks,frontend/utils,frontend/constants
sonar.tests=backend/api/tests.py,backend/api/test_e2e.py,frontend/tests

# Exclusions: This is CRITICAL for your project
# We must exclude the zip files and environment files to prevent errors
sonar.exclusions=**/*.zip,**/node_modules/**,**/venv/**,**/.env,**/migrations/**,**/dist/**,**/.next/**,**/coverage/**,**/__pycache__/**
sonar.coverage.exclusions=backend/manage.py,backend/core/asgi.py,backend/core/wsgi.py,backend/core/test_settings.py,backend/conftest.py,frontend/**
sonar.python.coverage.reportPaths=backend/coverage.xml

# Tell SonarCloud where the main languages are
sonar.python.version=3.11
sonar.javascript.environments=browser,node
